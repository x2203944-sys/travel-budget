<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 語境翻譯器</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:40px;
    background:#f6f1e8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#3f2d1d;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:56px;
    margin:0;
    font-weight:800;
}

.header p{
    margin-top:10px;
    color:#8c6f56;
    font-size:18px;
}

.main{
    display:grid;
    grid-template-columns:1fr 0.9fr;
    gap:25px;
}

.card{
    background:#fffaf3;
    border-radius:28px;
    padding:28px;
    box-shadow:0 10px 30px rgba(120,90,50,0.08);
}

.api-row{
    display:flex;
    gap:10px;
    margin-bottom:18px;
}

input, textarea, select{
    width:100%;
    border:1px solid #e5d5c3;
    border-radius:16px;
    padding:16px;
    font-size:16px;
    background:white;
    color:#3f2d1d;
}

textarea{
    resize:none;
    min-height:260px;
}

button{
    border:none;
    border-radius:16px;
    padding:14px 22px;
    background:#a36a33;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}

.option-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.action-row{
    display:flex;
    gap:12px;
    margin-top:16px;
}

.result-title{
    font-size:36px;
    font-weight:800;
    margin-bottom:18px;
}

.result-box{
    border:1px solid #ead8c4;
    border-radius:22px;
    padding:22px;
    margin-bottom:18px;
    background:white;
}

.translate-highlight{
    background:#edf5ff;
    border:2px solid #bfd8ff;
}

.small-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
}

.ai-text{
    min-height:90px;
    line-height:1.8;
    font-size:16px;
    white-space:pre-wrap;
}

.translate-text{
    min-height:220px;
    line-height:1.9;
    font-size:28px;
    font-weight:600;
    white-space:pre-wrap;
}

.notice{
    margin-top:18px;
    background:#f5ebde;
    border:1px dashed #d9b993;
    padding:16px;
    border-radius:18px;
    color:#8b6b4d;
    line-height:1.7;
    font-size:14px;
}

@media(max-width:900px){
    .main{
        grid-template-columns:1fr;
    }

    .option-row{
        grid-template-columns:1fr 1fr;
    }

    .header h1{
        font-size:42px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>AI 語境翻譯器</h1>
<p>中文・英文・日文互相翻譯｜先理解語境，再翻成自然用法</p>
</div>

<div class="main">

<div class="card">

<div class="api-row">
<input type="password" id="apiKey" placeholder="貼上 OpenAI API Key，只會存在此瀏覽器">
<button onclick="saveKey()">儲存 Key</button>
</div>

<div>
<div class="small-title">輸入原文</div>
<textarea id="inputText" placeholder="例如：這樣會不會太麻煩你？"></textarea>
</div>

<div class="option-row">
<select id="sourceLanguage">
<option>自動判斷原文</option>
</select>

<select id="targetLanguage" onchange="updateTranslateTitle()">
<option value="English">翻成英文</option>
<option value="Japanese">翻成日文</option>
<option value="Traditional Chinese">翻成中文</option>
</select>

<select id="tone">
<option value="自然">自然</option>
<option value="正式">正式</option>
<option value="禮貌">禮貌</option>
<option value="口語">口語</option>
</select>

<select>
<option>gpt-4.1-mini</option>
</select>
</div>

<div class="action-row">
<button onclick="translateText()">AI 翻譯</button>
</div>

<div class="notice">
注意：這是個人測試版。API Key 放在前端仍可能被看見，不建議公開給別人使用。正式版應該改成後端代理，避免 Key 外洩。
</div>

</div>

<div class="card">

<div class="result-title">AI 結果</div>

<div class="result-box">
<div class="small-title">AI 理解</div>
<div class="ai-text" id="aiUnderstanding">尚未翻譯</div>
</div>

<div class="result-box translate-highlight">
<div class="small-title" id="translateTitle">Translate</div>
<div class="translate-text" id="translationResult">尚未翻譯</div>
</div>

</div>

</div>

</div>

<script>

function saveKey(){
    const key = document.getElementById("apiKey").value;
    localStorage.setItem("openai_api_key", key);
    alert("API Key 已儲存");
}

window.onload = () => {
    const savedKey = localStorage.getItem("openai_api_key");
    if(savedKey){
        document.getElementById("apiKey").value = savedKey;
    }
    updateTranslateTitle();
};

function updateTranslateTitle(){
    const lang = document.getElementById("targetLanguage").value;
    const title = document.getElementById("translateTitle");

    if(lang === "English"){
        title.innerText = "Translate";
    }else if(lang === "Japanese"){
        title.innerText = "翻訳";
    }else{
        title.innerText = "翻譯";
    }
}

async function translateText(){

    const apiKey = document.getElementById("apiKey").value;
    const text = document.getElementById("inputText").value;
    const targetLanguage = document.getElementById("targetLanguage").value;
    const tone = document.getElementById("tone").value;

    updateTranslateTitle();

    const prompt = `
你是一個專業翻譯助手。

請先用繁體中文解釋這句話的語氣與含意。

再翻譯成 ${targetLanguage}。

語氣風格：${tone}

請依照以下格式：

AI理解：
（繁體中文）

翻譯：
（翻譯內容）
`;

    try{

        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + apiKey
            },
            body:JSON.stringify({
                model:"gpt-4.1-mini",
                messages:[
                    {
                        role:"user",
                        content:prompt + "\n\n" + text
                    }
                ],
                temperature:0.7
            })
        });

        const data = await response.json();

        if(data.error){
            alert(data.error.message);
            return;
        }

        const content = data.choices[0].message.content;

        const aiMatch = content.match(/AI理解：([\s\S]*?)翻譯：/);
        const transMatch = content.match(/翻譯：([\s\S]*)/);

        document.getElementById("aiUnderstanding").innerText =
            aiMatch ? aiMatch[1].trim() : "無法解析 AI 理解";

        document.getElementById("translationResult").innerText =
            transMatch ? transMatch[1].trim() : "無法解析翻譯結果";

    }catch(error){
        alert("發生錯誤：" + error.message);
    }
}

</script>

</body>
</html>
